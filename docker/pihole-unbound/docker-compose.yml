networks:
  proxy:
    name: proxy
    external: true
  piholenet:
    name: piholenet
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: "192.168.1.0/24"
          ip_range: "192.168.1.210/32"
          gateway: "192.168.1.1"
        - subnet: "2001:1c05:600:6f00::/64"
          gateway: "2001:1c05:600:6f00::1"

services:
  unbound:
    container_name: unbound
    restart: unless-stopped
    image: "${IMAGE}:latest"
    volumes:
      - "../config/pihole-unbound/unbound:/opt/unbound/etc/unbound"
    networks:
      piholenet:
        ipv4_address: 192.168.1.211
        ipv6_address: 2001:1c05:600:6f00::10

  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    networks:
      piholenet:
        ipv4_address: 192.168.1.210
        ipv6_address: 2001:1c05:600:6f00::11
    environment:
      TZ: "${TZ}"
      DNSSEC: false
      CUSTOM_CACHE_SIZE: 0
      DNS1: unbound
      DNS2: unbound
      WEBPASSWORD: "${WEBPASSWORD}"
    volumes:
      - "../config/pihole-unbound/pihole:/etc/pihole"
      - "../config/pihole-unbound/dnsmasq.d:/etc/dnsmasq.d"
    restart: unless-stopped
